<style>
    #scanner-container {
        max-width: 500px;
        margin: 0 auto;
    }
    #result-card {
        max-width: 500px;
        margin: 1.5rem auto 0;
        display: none;
    }
    #result-card .card {
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .result-valid .card { border-left: 5px solid #198754; }
    .result-reentry .card { border-left: 5px solid #fd7e14; }
    .result-invalid .card { border-left: 5px solid #dc3545; }
    .detail-row { display: flex; justify-content: space-between; padding: 0.4rem 0; border-bottom: 1px solid #f0f0f0; }
    .detail-label { font-weight: 600; color: #6c757d; }
    .detail-value { font-weight: 500; }
    .entry-badge { font-size: 1.1rem; font-weight: 700; }
    #scan-again-btn { max-width: 500px; margin: 1rem auto 0; display: none; }
</style>

<h3 class="mb-3 fw-bold text-center">Workshop QR Scanner</h3>

<div class="container-fluid">
    <div id="scanner-container">
        <div id="qr-reader"></div>
    </div>

    <div id="result-card">
        <div class="card">
            <div class="card-body" id="result-body"></div>
        </div>
    </div>

    <div id="scan-again-btn" class="text-center">
        <button class="btn btn-primary w-100" onclick="resetScanner()">
            <i class="bi bi-qr-code-scan"></i> Scan Again
        </button>
    </div>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>
<script>
    let html5QrCode = null;
    let isProcessing = false;

    function getAuthHeaders() {
        return { Authorization: 'Bearer ' + localStorage.getItem("token") };
    }

    function initScanner() {
        html5QrCode = new Html5Qrcode("qr-reader");
        html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: { width: 250, height: 250 } },
            onScanSuccess,
            () => {} // ignore scan failures
        ).catch(function(err) {
            toastr.error("Camera access denied or not available.");
            console.error("Camera error:", err);
        });
    }

    function onScanSuccess(decodedText) {
        if (isProcessing) return;
        isProcessing = true;

        // Stop scanning
        html5QrCode.stop().then(function() {
            // Parse QR data
            let qrData;
            try {
                qrData = JSON.parse(decodedText);
            } catch(e) {
                showInvalidResult("Invalid QR code format");
                return;
            }

            if (!qrData.id) {
                showInvalidResult("QR code missing registration ID");
                return;
            }

            validateTicket(qrData.id);
        }).catch(function(err) {
            console.error("Stop error:", err);
            isProcessing = false;
        });
    }

    function validateTicket(registrationId) {
        $.ajax({
            url: localStorage.getItem("url").replace(/\/$/, "") + "/api/admin/workshop/validate-ticket",
            method: "POST",
            contentType: "application/json",
            headers: getAuthHeaders(),
            data: JSON.stringify({ registrationId: registrationId }),
            success: function(res) {
                if (res.status && res.data) {
                    showValidResult(res.data);
                } else {
                    showInvalidResult(res.message || "Invalid ticket");
                }
            },
            error: function(xhr) {
                var msg = "Validation failed";
                try {
                    var body = JSON.parse(xhr.responseText);
                    msg = body.message || msg;
                } catch(e) {}
                showInvalidResult(msg);
            }
        });
    }

    function showValidResult(data) {
        var isReEntry = data.isReEntry;
        var cardClass = isReEntry ? 'result-reentry' : 'result-valid';
        var statusColor = isReEntry ? '#fd7e14' : '#198754';
        var statusText = isReEntry
            ? '<span class="entry-badge" style="color:#fd7e14"><i class="bi bi-arrow-repeat"></i> Re-entry #' + data.checkedInCount + '</span>'
            : '<span class="entry-badge" style="color:#198754"><i class="bi bi-check-circle-fill"></i> Entry #' + data.checkedInCount + '</span>';

        var dateStr = new Date(data.date).toLocaleDateString('en-IN', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });

        var html = '<div class="text-center mb-3">' + statusText + '</div>' +
            '<div class="detail-row"><span class="detail-label">Name</span><span class="detail-value">' + escapeHtml(data.participantName) + '</span></div>' +
            '<div class="detail-row"><span class="detail-label">Phone</span><span class="detail-value">' + escapeHtml(data.participantPhone) + '</span></div>' +
            '<div class="detail-row"><span class="detail-label">Branch</span><span class="detail-value">' + escapeHtml(data.branch) + '</span></div>' +
            '<div class="detail-row"><span class="detail-label">Date</span><span class="detail-value">' + dateStr + '</span></div>';

        $('#result-card').removeClass('result-valid result-reentry result-invalid').addClass(cardClass);
        $('#result-body').html(html);
        $('#result-card').slideDown(300);
        $('#scan-again-btn').show();

        if (isReEntry) {
            toastr.warning('Re-entry #' + data.checkedInCount + ' for ' + data.participantName);
        } else {
            toastr.success('Check-in successful for ' + data.participantName);
        }
    }

    function showInvalidResult(message) {
        var html = '<div class="text-center">' +
            '<i class="bi bi-x-circle-fill" style="font-size:2.5rem;color:#dc3545"></i>' +
            '<h5 class="mt-2 text-danger">' + escapeHtml(message) + '</h5>' +
            '</div>';

        $('#result-card').removeClass('result-valid result-reentry result-invalid').addClass('result-invalid');
        $('#result-body').html(html);
        $('#result-card').slideDown(300);
        $('#scan-again-btn').show();

        toastr.error(message);
    }

    function resetScanner() {
        isProcessing = false;
        $('#result-card').slideUp(200);
        $('#scan-again-btn').hide();
        initScanner();
    }

    function escapeHtml(str) {
        if (!str) return '-';
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
    }

    $(document).ready(function() {
        initScanner();
    });
</script>
